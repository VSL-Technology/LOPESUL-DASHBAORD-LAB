name: Deploy Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lopesul/apps/dashboard
            git fetch origin
            git reset --hard origin/main
            bash scripts/ci/deny_leaky_errors.sh
            docker compose down
            docker compose build
            docker compose up -d

      - name: Wait for dashboard health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Waiting for dashboard container to become healthy..."

            for i in {1..30}; do
              if docker exec dashboard-real curl -fsS http://127.0.0.1:3000/api/health/live >/dev/null; then
                echo "Dashboard is healthy."
                exit 0
              fi
              echo "Still waiting... attempt $i"
              sleep 2
            done

            echo "Dashboard did not become healthy after 60 seconds."
            docker logs dashboard-real --tail 100
            exit 1
