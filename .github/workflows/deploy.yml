name: Deploy Dashboard

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lopesul/apps/dashboard
            git fetch origin
            git reset --hard origin/main
            bash scripts/ci/deny_leaky_errors.sh
            docker compose down
            docker compose build
            docker compose up -d

            echo "Aguardando container iniciar..."
            sleep 8

            echo "Testando live dentro do container..."
            docker exec dashboard-real curl -fsS http://localhost:3000/api/health/live > /dev/null || exit 1

            echo "Testando ready dentro do container..."
            docker exec dashboard-real curl -fsS http://localhost:3000/api/health/ready > /dev/null || exit 1

            echo "Dashboard saudável."
